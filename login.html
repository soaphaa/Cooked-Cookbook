<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Login/Sign Up</title>
    
    <link rel="icon" type="image/x-icon" href="images/logo.ico">
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    
    <header>
        <h1>    <img src="images/logo.png" alt="Cooked Cookbook" class="header-logo"> </h1>
    </header>
    
    <div class="auth-container">
        
        <div id="auth-tabs">
            <button id="login-tab" class="active-tab">Log In</button>
            <button id="signup-tab">Sign Up</button>
        </div>
        
        <!-- Login form (shown by default) -->
        <div id="login-form">
            <h2 class="auth-heading">Log In</h2>
            <input class="auth-input" type="text" id="login-username" placeholder="Username" />
            <input class="auth-input" type="password" id="login-password" placeholder="Password" />
            <label class="show-password">
                <input type="checkbox" id="show-login-password"> Show password
            </label>
            <button class="auth-btn" id="login-btn">Log In</button>
            <p id="login-message" class="auth-message"></p>
        </div>
        
        <!-- Signup form (hidden by default) -->
<div id="signup-form" class="hidden">
    <h2 class="auth-heading">Sign Up</h2>
    <input class="auth-input" type="text" id="signup-username" placeholder="Username" />
    <input class="auth-input" type="password" id="signup-password" placeholder="Password" />
    <label class="show-password">
        <input type="checkbox" id="show-signup-password"> Show password
    </label>
    <button class="auth-btn" id="signup-btn">Sign Up</button>
    <p id="signup-message" class="auth-message"></p>
</div>
        
    </div>
    
    <script src="auth.js"></script>
</body>
</html>
