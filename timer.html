<!-- Single recipe page (cooking mode, timer, servings) -->
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recipe page</title>
    
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    
<!-- Timer widget- able to be minimized(sophia) -->
<section id="timer" class="timer-window">
    <div class="timer-card" id="timer-card">

        <span class="timer-title">Timer</span>

        <div class="ring-wrap">
            <svg class="ring" viewBox="0 0 75 75">
                <circle class="ring-bg" cx="30" cy="30" r="25"></circle>
                <circle class="ring-progress" id="ring" cx="30" cy="30" r="25"></circle>
            </svg>
        </div>

        <div class="timer-body">
            <p id="timer-display">00:00</p>
            <select id="timer-select">
                <option value="60">1 min</option>
                <option value="120">2 min</option>
                <option value="180">3 min</option>
                <option value="240">4 min</option>
                <option value="300">5 min</option>
                <option value="600">10 min</option>
                <option value="900">15 min</option>
                <option value="1200">20 min</option>
                <option value="1800">30 min</option>
            </select>
            <div class="timer-controls">
                <button id="toggle-start-btn">Start</button>
                <button id="reset-btn">Reset</button>
            </div>
        </div>
    </div>
</section>
    
</body>
</html>
