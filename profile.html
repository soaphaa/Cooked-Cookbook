<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — Cooked Cookbook</title>
    <link rel="icon" type="image/x-icon" href="images/logo.ico">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>

    <header>
        <h1><img src="images/logo2.png" alt="Cooked Cookbook" class="header-logo"></h1>
    </header>

    <div id="home-button"></div>

    <main class="profile-page">

        <section class="profile-card">

            <div class="profile-avatar-wrap">
                <div class="profile-avatar" id="profile-avatar">
                    <img src="images/pinkPfp.jpg" alt="profile picture">
                </div>
            </div>

            <div class="profile-info">
                <h2 class="profile-username" id="profile-username">guest</h2>
            </div>

            <div class="profile-stats">
                <div class="stat-block">
                    <span class="stat-number" id="stat-favourites">0</span>
                    <span class="stat-label">favourites</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-block">
                    <span class="stat-number" id="stat-completed">0</span>
                    <span class="stat-label">completed</span>
                </div>
            </div>

            <button id="logout-btn" class="logout-btn">Log Out</button>

        </section>

        <div class="profile-divider">
            <span>✩ favourite recipes ✩</span>
        </div>

        <section class="profile-recipes" id="profile-recipes">
        </section>

    </main>

    <script src="script.js"></script>
    <script src="profile.js"></script>
</body>
</html>
