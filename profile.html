<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — Cooked Cookbook</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>

    <header>
        <h1>Cooked Cookbook</h1>
    </header>

    <div id="home-button"></div>

    <main class="profile-page">

        <!-- Profile card -->
        <section class="profile-card">

            <!-- pfp -->
            <div class="profile-avatar-wrap">
                <div class="profile-avatar" id="profile-avatar">
                    <img src="images/pinkPfp.jpg" alt="404">
                </div>
            </div>

            <!-- Name + bio -->
            <div class="profile-info">
                <h2 class="profile-username" id="profile-username">guest</h2>
                <p class="profile-bio">bio empty.</p>
            </div>

            <!-- Stats row -->
            <div class="profile-stats">
                <div class="stat-block">
                    <span class="stat-number">0</span>
                    <span class="stat-label">recipes</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-block">
                    <span class="stat-number">0</span>
                    <span class="stat-label">favourites</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-block">
                    <span class="stat-number">0</span>
                    <span class="stat-label">completed</span>
                </div>
            </div>

        </section>

        <!-- Divider -->
        <div class="profile-divider">
            <span>✩ favourite recipes ✩</span>
        </div>

        <!-- Recipe grid placeholder -->
        <section class="profile-recipes" id="profile-recipes">
            <div class="profile-empty">
                <p>no recipes yet !!</p>
                <a href="index.html" class="recipe-btn">browse recipes</a>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
    <script src="profile.js"></script>
</body>
</html>
